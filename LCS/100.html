    <meta property="og:description"
        content="Checklist completo para lograr el 100% en GTA LCS. Seguimiento de misiones, paquetes ocultos y progreso total en Grand Theft Auto: Liberty City Stories.">
    <meta property="og:image" content="https://viceclub.vercel.app/assets/images/main/og.webp">

<body class="gta-lcs">
    <header>
        <div class="logo-container">
            <a href="../index.html">
                <img src="../assets/images/main/logo.webp" alt="Vice Club Logo">
            </a>
            <h1>VICE CLUB</h1>
        </div>
        <nav>
            <button id="hamburger" aria-label="Abrir menú">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </button>
        </nav>
    </header>
    <div class="block" id="container">
        <div class="text-container">
            <h2>Lista para el 100% de Grand Theft Auto: Liberty City Stories</h2>
            <div class="checklist-percentage"></div>
            <div class="checklist-container">
            </div>
        </div>

    </div>

    <div id="rightContent">
        <div class="right-content-logos">
            <a href="../III/100.html">
                <img src="../assets/images/main/III.webp" alt="Logo de GTA 3" loading="lazy">
            </a>
            <a href="../VC/100.html">
                <img src="../assets/images/main/VC.webp" alt="Logo de GTA Vice City" loading="lazy">
            </a>
            <a href="../SA/100.html">
                <img src="../assets/images/main/SA.webp" alt="Logo de GTA San Andreas" loading="lazy">
            </a>
            <a href="#" class="active">
                <img src="../assets/images/main/LCS.webp" alt="Logo de GTA Liberty City Stories" loading="lazy"
                    class="active">
            </a>
            <a href="../VCS/100.html">
                <img src="../assets/images/main/VCS.webp" alt="Logo de GTA Vice City Stories" loading="lazy">
            </a>
            <a href="../IV/100.html">
                <img src="../assets/images/main/IV.webp" alt="Logo de GTA 4" loading="lazy">
            </a>
            <a href="../V/100.html">
                <img src="../assets/images/main/V.webp" alt="Logo de GTA 5" loading="lazy">
            </a>
            <a href="../VI/inicio.html">
                <img src="../assets/images/main/VI.webp" alt="Logo de GTA 6" loading="lazy">
            </a>
        </div>
        <nav class="right-content-nav">
            <div class="right-content-links">
                <a href="inicio.html">
                    <span class="material-symbols-rounded">home</span>INICIO
                </a>
                <a href="#" class="active">
                    <span class="material-symbols-rounded">checklist</span>100%
                </a>
                <a href="artworks.html">
                    <span class="material-symbols-rounded">art_track</span>ARTWORKS
                </a>
                <a href="mapa.html">
                    <span class="material-symbols-rounded">map</span>MAPA
                </a>
                <a href="radio.html">
                    <span class="material-symbols-rounded">radio</span>RADIO
                </a>
                <a href="trucos.html">
                    <span class="material-symbols-rounded">videogame_asset</span>TRUCOS
                </a>
            </div>
            <div class="right-content-footer">
                <div class="footer-settings">
                    <p>
                        <span class="material-symbols-rounded">volume_up</span>Sonidos
                    </p>

                        <input type="checkbox" id="soundToggle">
                        <span></span>
                    </label>
                </div>
            </div>
        </nav>
    </div>

    <!-- Sounds -->

    <script src="../assets/scripts/sounds.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const button = document.getElementById("hamburger");
            const rightContent = document.getElementById("rightContent");
            const block = document.querySelector(".block");

            button.addEventListener("click", function (event) {
                event.stopPropagation();
                rightContent.classList.toggle("show");
                button.classList.toggle("active");

                if (block) block.classList.toggle("menu-shift");
            });

            document.addEventListener("click", function (event) {
                if (!rightContent.contains(event.target) && !button.contains(event.target)) {
                    rightContent.classList.remove("show");
                    button.classList.remove("active");

                    if (block) block.classList.remove("menu-shift");
                }
            });
        });
    </script>
    <script src="../assets/scripts/checklist.js"></script>
</body>

</html>
